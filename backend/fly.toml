# fly.toml app configuration file generated for iqchatbackend on 2026-05-07T21:50:01+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'iqchatbackend'
primary_region = 'cdg'

[build]

[env]
  DATABASE_URL = "sqlite:////data/iqchat.db"
  UPLOAD_DIR = "/data/uploads"

[mounts]
  source = "iqchat_data"
  destination = "/data"
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
